<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Notice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(-45deg, #1e3a8a, #6d28d9, #0f766e, #312e81);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    overflow: hidden;
    padding: 20px;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .bubble {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    animation: rise 14s infinite ease-in;
    bottom: -150px;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
  }
  .card {
    position: relative;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 28px;
    padding: 50px 40px;
    max-width: 560px;
    width: 100%;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    animation: pop 0.8s cubic-bezier(.17,.67,.4,1.4);
  }
  @keyframes pop {
    0% { transform: scale(0.85) translateY(30px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .bot-icon {
    font-size: 70px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3));
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-14px) rotate(3deg); }
  }
  .zzz {
    font-size: 26px;
    color: #c4b5fd;
    letter-spacing: 4px;
    margin-top: 4px;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  h1 {
    color: #fff;
    font-size: clamp(22px, 5vw, 32px);
    line-height: 1.5;
    margin: 22px 0 18px;
    font-weight: 800;
    text-shadow: 0 4px 12px rgba(0,0,0,0.3);
  }
  .highlight {
    background: linear-gradient(90deg, #fde047, #fb923c);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub {
    color: rgba(255,255,255,0.85);
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 26px;
  }
  .timer {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 14px 26px;
    border-radius: 50px;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .dot {
    width: 12px; height: 12px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 0 rgba(74,222,128,0.6);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.7); }
    70% { box-shadow: 0 0 0 16px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }
  .footer {
    margin-top: 24px;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
  }
</style>
</head>
<body>
  <span class="bubble" style="left:10%; width:40px; height:40px; animation-delay:0s;"></span>
  <span class="bubble" style="left:25%; width:20px; height:20px; animation-delay:2s;"></span>
  <span class="bubble" style="left:45%; width:60px; height:60px; animation-delay:4s;"></span>
  <span class="bubble" style="left:65%; width:30px; height:30px; animation-delay:1s;"></span>
  <span class="bubble" style="left:80%; width:50px; height:50px; animation-delay:3s;"></span>
  <span class="bubble" style="left:90%; width:25px; height:25px; animation-delay:5s;"></span>
  <div class="card">
    <div class="bot-icon">🤖</div>
    <div class="zzz">Z z z...</div>
    <h1>YE BOT KABHI KABHI <span class="highlight">SLEEPING MODE</span> ME CHALA JATA HAI<br>TO AAP <span class="highlight">5 MINUTE</span> BAD DEKHIYE</h1>
    <p class="sub">Bot abhi thoda aaram kar raha hai 😴<br>Kuch hi der me wapas active ho jayega.</p>
    <div class="timer">
      <span class="dot"></span>
      <span id="countdown">05:00</span>
    </div>
    <p class="footer">Dhanyawaad aapke dhairya ke liye 💜</p>
  </div>
<script>
  let total = 5 * 60;
  const el = document.getElementById('countdown');
  function tick() {
    const m = String(Math.floor(total / 60)).padStart(2, '0');
    const s = String(total % 60).padStart(2, '0');
    el.textContent = m + ':' + s;
    total = total > 0 ? total - 1 : 5 * 60;
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
